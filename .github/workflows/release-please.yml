name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-desktop:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target_platform: macos
            arch: arm64
          - os: macos-15-intel
            target_platform: macos
            arch: x64
          - os: windows-latest
            target_platform: windows
            arch: x64
          - os: ubuntu-latest
            target_platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux Qt runtime dependencies
        if: ${{ matrix.target_platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0

      - name: Install desktop build dependencies
        run: python -m pip install -e ".[desktop,desktop-build]"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build desktop release asset
        run: >
          python scripts/build_desktop_release.py
          --release "${{ needs.release-please.outputs.tag_name }}"
          --target-platform "${{ matrix.target_platform }}"
          --arch "${{ matrix.arch }}"

      - name: Upload desktop release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" build/release-assets/* --clobber
